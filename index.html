<!DOCTYPE html>
<html>
<head>
<title>Aesthetic Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f172a,#1e293b,#111827,#000000);
background-size:400% 400%;
animation:bg 10s ease infinite;
overflow:hidden;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:320px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,0.15);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
margin-bottom:15px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
color:#ddd;
margin-bottom:20px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:black;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

input{
margin-top:15px;
color:white;
}

</style>
</head>

<body>

<div class="card">

<img src="https://i.imgur.com/2DhmtJ4.png" class="profile" id="photo">

<h1>Gourav ✨</h1>

<p>Welcome To My Aesthetic Website</p>

<button
