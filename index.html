<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessing Her Heart 💖</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{
background:black;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.main{
position:relative;
z-index:2;
text-align:center;
padding:30px;
width:90%;
max-width:500px;
backdrop-filter:blur(8px);
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
box-shadow:0 0 30px rgba(255,0,128,0.4);
animation:fade 2s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:2.5rem;
color:#ff4da6;
text-shadow:0 0 20px #ff4da6;
margin-bottom:10px;
}

.typing{
color:#00ffcc;
font-size:1rem;
white-space:nowrap;
overflow:hidden;
border-right:2px solid #00ffcc;
width:0;
margin:auto;
animation:typing 4s steps(35,end) forwards,
blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{border-color:transparent}
}

p{
margin-top:20px;
font-size:1rem;
color:#ddd;
line-height:1.6;
}

img{
margin-top:20px;
width:220px;
height:220px;
object-fit:cover;
border-radius:20px;
border:3px solid #ff4da6;
box-shadow:0 0 25px #ff4da6;
transition:.4s;
}

img:hover{
transform:scale(1.05);
}

.buttons{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button{
padding:12px 22px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
cursor:pointer;
font-size:1rem;
transition:.3s;
box-shadow:0 0 15px #ff4da6;
}

button:hover{
transform:scale(1.1);
background:#ff1a8c;
}

#message{
margin-top:20px;
font-size:1.1rem;
color:#00ffcc;
min-height:40px;
}

input{
margin-top:15px;
color:white;
}

.counter{
margin-top:15px;
color:#ff99cc;
font-size:0.95rem;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="main">

<h1>HEY CUTIE 💖</h1>

<div class="typing">
Access granted to the cutest girl alive...
</div>

<p>
Out of billions of websites...  
you still opened mine 🥺💌
</p>

<img src="YOUR_IMAGE_LINK_HERE" id="photo">

<br>

<input type="file" accept="image/*" onchange="loadFile(event)">

<div class="counter">
✨ You became my happiness many days ago ✨
</div>

<div class="buttons">

<button onclick="loveMsg()">
Do you miss me? 🥺
</button>

<button onclick="compliment()">
Random Compliment ✨
</button>

<button onclick="hack()">
Hack My Heart 💻
</button>

</div>

<div id="message"></div>

<audio autoplay loop>
<source src="YOUR_MUSIC_LINK_HERE" type="audio/mp3">
</audio>

</div>

<script>
function loadFile(event){
document.getElementById('photo').src =
URL.createObjectURL(event.target.files[0]);
}

function loveMsg(){
document.getElementById("message").innerHTML =
"I knew it 😎❤️";
}

function compliment(){

const lines = [
"You're prettier than my sleep 😭💖",
"Your smile > entire internet ✨",
"You are my favorite notification 💌",
"Even stars get jealous of you 🌙",
"You make my bad days better 💖"
];

document.getElementById("message").innerHTML =
lines[Math.floor(Math.random()*lines.length)];
}

function hack(){
document.getElementById("message").innerHTML =
"❤️ Successfully hacked your heart ❤️";
}

/* MATRIX EFFECT */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters =
"01LOVEYOU💖";

const fontSize = 14;
const columns = canvas.width/fontSize;

const drops = [];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff4da6";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text =
letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height &&
Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);

</script>

</body>
</html>
