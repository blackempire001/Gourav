<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online Music Player</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

.header{
  background:#1db954;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.searchBox{
  padding:10px;
}

input{
  width:100%;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}

.song{
  background:#181818;
  margin:10px;
  padding:12px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:#1db954;
  border:none;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#181818;
  padding:10px;
}
</style>

</head>

<body>

<div class="header">
🎧 Online Music Search Player
</div>

<div class="searchBox">
<input id="search" onkeyup="filterSongs()" placeholder="Search songs... 🔍">
</div>

<div id="list"></div>

<div class="player">
<audio id="audio" controls style="width:100%"></audio>
</div>

<script>

/* 🌐 ONLINE SONGS (WORKING LINKS) */
const songs = [
{
name:"Acoustic Guitar",
file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},
{
name:"Relax Beat",
file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
},
{
name:"Soft Music",
file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
},
{
name:"Deep Focus",
file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
},
{
name:"Party Beat",
file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"
}
];

function show(list){
let html="";
list.forEach(s=>{
html+=`
<div class="song">
<span>${s.name}</span>
<button onclick="play('${s.file}')">Play</button>
</div>`;
});
document.getElementById("list").innerHTML=html;
}

function play(file){
document.getElementById("audio").src=file;
document.getElementById("audio").play();
}

function filterSongs(){
let val=document.getElementById("search").value.toLowerCase();
let f=songs.filter(s=>s.name.toLowerCase().includes(val));
show(f);
}

show(songs);

</script>

</body>
</html>
