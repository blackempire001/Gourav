<!DOCTYPE html>
<html>
<head>
<title>My Music Site</title>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial;
    margin:0;
}

/* HEADER */
header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 15px;
    background:#000;
}

header img{
    height:40px;
}

/* SEARCH */
.search-box{
    width:90%;
    padding:10px;
    margin:10px;
    border-radius:10px;
    border:none;
}

/* SONG GRID */
.song-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:#1e1e1e;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:10px;
}

h3{
    padding-left:10px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
    <h2>🎵 My Music</h2>
    <img src="YOUR_LOGO_URL_HERE" alt="logo">
</header>

<!-- SEARCH -->
<input class="search-box" id="search" placeholder="Search songs..." onkeyup="searchSongs()">

<h3>🔥 Trending Songs</h3>
<div class="song-grid" id="songList"></div>

<script>

let allSongs = [];

// 🔥 Load songs automatically (Spotify style home)
async function loadSongs(){
    let res = await fetch("https://itunes.apple.com/search?term=india&entity=song&limit=25");
    let data = await res.json();

    allSongs = data.results;
    showSongs(allSongs);
}

// 🎵 Show songs
function showSongs(songs){
    let box = document.getElementById("songList");
    box.innerHTML = "";

    songs.forEach(song=>{
        box.innerHTML += `
        <div class="card">
            <img src="${song.artworkUrl100}">
            <p>${song.trackName}</p>
            <small>${song.artistName}</small>
            <audio controls src="${song.previewUrl}"></audio>
        </div>
        `;
    });
}

// 🔍 Search songs
function searchSongs(){
    let val = document.getElementById("search").value.toLowerCase();

    let filtered = allSongs.filter(song =>
        song.trackName.toLowerCase().includes(val)
    );

    showSongs(filtered);
}

loadSongs();

</script>

</body>
</html>
