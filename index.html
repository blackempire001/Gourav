<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire Music</title>

<style>

body{
    margin:0;
    background:#121212;
    color:white;
    font-family:Arial;
}

/* HEADER */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:black;
    position:sticky;
    top:0;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.logo h2{
    margin:0;
}

/* SEARCH */

.search-box{
    width:90%;
    margin:15px auto;
    display:block;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

/* SONG GRID */

.song-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:12px;
}

.card{
    background:#1e1e1e;
    border-radius:15px;
    padding:10px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    border-radius:12px;
}

.song-name{
    margin-top:8px;
    font-weight:bold;
}

.artist{
    color:#aaa;
    font-size:14px;
}

audio{
    width:100%;
    margin-top:8px;
}

.heading{
    padding-left:12px;
}

</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg">
        <h2>Empire Music</h2>
    </div>
</header>

<input 
type="text" 
class="search-box" 
id="search"
placeholder="Search any song..."
oninput="searchSongs()"
>

<h3 class="heading">🔥 Trending Songs</h3>

<div class="song-grid" id="songList"></div>

<script>

let trendingSongs = [];

// LOAD TRENDING SONGS
async function loadTrending(){

    try{

        let response = await fetch(
        "https://itunes.apple.com/search?term=punjabi&entity=song&limit=20"
        );

        let data = await response.json();

        trendingSongs = data.results;

        showSongs(trendingSongs);

    }catch(error){
        console.log(error);
    }

}

// SHOW SONGS
function showSongs(songs){

    let songList = document.getElementById("songList");

    songList.innerHTML = "";

    if(songs.length === 0){

        songList.innerHTML = `
        <h2 style="padding:20px;">
        No songs found 😢
        </h2>
        `;

        return;
    }

    songs.forEach(song => {

        songList.innerHTML += `

        <div class="card">

            <img src="${song.artworkUrl100}" />

            <div class="song-name">
                ${song.trackName}
            </div>

            <div class="artist">
                ${song.artistName}
            </div>

            <audio controls>
                <source src="${song.previewUrl}">
            </audio>

        </div>

        `;

    });

}

// SEARCH SONGS FROM INTERNET
async function searchSongs(){

    let query = document
    .getElementById("search")
    .value
    .trim();

    // EMPTY SEARCH = TRENDING
    if(query === ""){

        showSongs(trendingSongs);
        return;
    }

    try{

        let response = await fetch(
        `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=20`
        );

        let data = await response.json();

        showSongs(data.results);

    }catch(error){

        console.log(error);

    }

}

// START APP
loadTrending();

</script>

</body>
</html>
