<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Ultra Music Site</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

/* HEADER */
.header{
  background:#1db954;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

/* CLOCK */
.clock{
  width:65px;
  height:65px;
  border:3px solid white;
  border-radius:50%;
  position:relative;
}
.hand{
  position:absolute;
  left:50%;
  bottom:50%;
  transform-origin:bottom;
  background:white;
}
.hour{width:4px;height:18px;}
.min{width:3px;height:22px;}
.sec{width:2px;height:26px;background:red;}

/* SEARCH */
.searchBox{
  padding:10px;
}
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  outline:none;
}

/* SONG */
.song{
  background:#181818;
  margin:10px;
  padding:12px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#181818;
  padding:10px;
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:5px;
}

button{
  background:#1db954;
  border:none;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

input[type=range]{
  width:100%;
}
</style>

</head>

<body>

<div class="header">
🎵 My Music Site

<!-- CLOCK -->
<div class="clock">
<div class="hand hour" id="h"></div>
<div class="hand min" id="m"></div>
<div class="hand sec" id="s"></div>
</div>
</div>

<!-- SEARCH -->
<div class="searchBox">
<input id="search" onkeyup="searchSong()" placeholder="Search songs 🔍">
</div>

<!-- SONG LIST -->
<div id="list"></div>

<!-- PLAYER -->
<div class="player">

<div id="current">No song playing</div>

<input type="range" id="progress" value="0" onchange="seekSong()">

<audio id="audio"></audio>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">▶️</button>
<button onclick="nextSong()">⏭</button>
<button onclick="shuffleSong()">🔀</button>

<input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
</div>

</div>

<script>

/* SONG LIST */
const songs = [
{name:"Cheema Y - Money 2X", file:"money2x.mp3"},
{name:"Cheema Y - Shady", file:"shady.mp3"},
{name:"Cheema Y - CEO", file:"ceo.mp3"},
{name:"AP Dhillon - Excuses", file:"excuses.mp3"},
{name:"Arjan Dhillon - Lifestyle", file:"lifestyle.mp3"}
];

let current = 0;
let isPlaying = false;

let audio = document.getElementById("audio");

/* SHOW SONGS */
function render(list){
let html="";
list.forEach((s,i)=>{
html+=`
<div class="song">
<span>${s.name}</span>
<button onclick="playSong(${i})">Play</button>
</div>`;
});
document.getElementById("list").innerHTML=html;
}

/* PLAY */
function playSong(i){
current=i;
audio.src=songs[i].file;
audio.play();
isPlaying=true;
document.getElementById("current").innerText="Now Playing: "+songs[i].name;
render(songs);
}

/* PLAY PAUSE */
function togglePlay(){
if(isPlaying){
audio.pause();
isPlaying=false;
}else{
audio.play();
isPlaying=true;
}
}

/* NEXT PREV */
function nextSong(){
current=(current+1)%songs.length;
playSong(current);
}

function prevSong(){
current=(current-1+songs.length)%songs.length;
playSong(current);
}

/* SHUFFLE */
function shuffleSong(){
let r=Math.floor(Math.random()*songs.length);
playSong(r);
}

/* END AUTO NEXT */
audio.addEventListener("ended",nextSong);

/* PROGRESS BAR */
audio.addEventListener("timeupdate",()=>{
document.getElementById("progress").value=
(audio.currentTime/audio.duration)*100;
});

function seekSong(){
audio.currentTime=
(document.getElementById("progress").value/100)*audio.duration;
}

/* VOLUME */
function setVolume(v){
audio.volume=v;
}

/* SEARCH */
function searchSong(){
let val=document.getElementById("search").value.toLowerCase();
let f=songs.filter(s=>s.name.toLowerCase().includes(val));
render(f);
}

/* CLOCK */
function clock(){
let d=new Date();
document.getElementById("h").style.transform=`rotate(${d.getHours()*30}deg)`;
document.getElementById("m").style.transform=`rotate(${d.getMinutes()*6}deg)`;
document.getElementById("s").style.transform=`rotate(${d.getSeconds()*6}deg)`;
}
setInterval(clock,1000);
clock();

/* INIT */
render(songs);

</script>

</body>
</html>
