<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Empire Music</title>

<style>

body{
margin:0;
padding:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
}

/* HEADER */

header{
background:#111;
padding:15px;
border-bottom:2px solid red;
}

.logo{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
}

.logo img{
width:55px;
height:55px;
border-radius:50%;
border:2px solid red;
}

.logo h2{
font-size:30px;
letter-spacing:2px;
}

/* SEARCH BOX */

.search-box{
margin-top:40px;
}

input{
width:70%;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
outline:none;
}

button{
padding:14px 20px;
border:none;
border-radius:12px;
background:red;
color:white;
font-size:18px;
margin-top:15px;
cursor:pointer;
}

/* PLAYER */

#player{
margin-top:30px;
}

iframe{
width:90%;
max-width:500px;
height:300px;
border-radius:20px;
border:2px solid red;
box-shadow:0 0 20px red;
}

/* FOOTER */

.footer{
margin-top:50px;
padding:20px;
color:gray;
font-size:14px;
}

</style>
</head>

<body>

<header>

<div class="logo">

<img src="logo.png">

<h2>🎶 BLACK EMPIRE musice </h2>

</div>

</header>

<div class="search-box">

<h1>Search Any Song 🎵</h1>

<input type="text" id="song" placeholder="Enter song name">

<br>

<button onclick="playSong()">PLAY SONG</button>

</div>

<div id="player"></div>

<div class="footer">
Welcome To Black Empire Music Website
</div>

<script>

function playSong(){

let song = document.getElementById("song").value;

document.getElementById("player").innerHTML = `

<iframe
width="100%"
height="300"

src="https://www.youtube.com/embed/videoseries?listType=search&list=${song}&autoplay=1"

title="YouTube music player"

frameborder="0"

allow="autoplay"

allowfullscreen>

</iframe>

`;

}

</script>

</body>
</html>
